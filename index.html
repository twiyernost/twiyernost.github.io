<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ть (Твиьерность)</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --accent: #1d9bf0;
    }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); }
    #auth { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:100; }
    .auth-box { background:#16181c; padding:40px; border-radius:16px; text-align:center; width:320px; }
    .logo { font-size:80px; font-weight:bold; cursor:pointer; transition:0.3s; }
    .logo:hover { transform:scale(1.1); }
    .full-name { font-size:28px; margin-top:10px; opacity:0; transition:0.4s; }
    .full-name.active { opacity:1; }
    button { background:var(--accent); color:white; border:none; padding:12px 24px; border-radius:999px; font-size:16px; margin:10px; cursor:pointer; }
    button:hover { background:#1a8cd8; }
    #app { display:none; height:100vh; }
    .container { display:flex; height:100vh; max-width:1200px; margin:0 auto; }
    .sidebar { width:250px; padding:20px; border-right:1px solid #333; }
    .main { flex:1; border-right:1px solid #333; overflow-y:auto; }
    .rightbar { width:300px; padding:20px; }
    .header { padding:15px; border-bottom:1px solid #333; font-size:20px; font-weight:bold; }
    .post-box { padding:15px; border-bottom:1px solid #333; }
    textarea { width:100%; background:transparent; border:none; color:white; font-size:18px; resize:none; height:80px; }
    .posts { }
    .post { padding:15px; border-bottom:1px solid #333; }
    .post-header { display:flex; gap:10px; }
    .avatar { width:48px; height:48px; border-radius:50%; background:#333; }
    .post-content { flex:1; }
    .actions { display:flex; justify-content:space-between; margin-top:10px; max-width:300px; }
    .action { cursor:pointer; }
    .like { color:#f91880; }
    .comment-input { width:100%; margin-top:8px; }
    .guest-notice { color:#888; font-size:14px; }
  </style>
</head>
<body>

  <!-- Экран авторизации -->
  <div id="auth">
    <div class="auth-box">
      <div id="logo" class="logo" onclick="toggleLogo()">ТЬ</div>
      <div id="expandText" class="full-name">Твиьерность</div>
      <h2>Добро пожаловать в Ть</h2>
      <p>Присоединяйся к разговору</p>
      
      <div id="g_id_onload"
           data-client_id="254609526549-srv2qeo7otu12op9eh9qfkf0h8lpgck9.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_blue" data-text="continue_with"></div>

      <button onclick="guestLogin()">Войти как гость</button>
      <p style="margin-top:20px; font-size:12px;">Гости могут только читать посты</p>
    </div>
  </div>

  <!-- Основное приложение -->
  <div id="app">
    <div class="container">
      <!-- Сайдбар -->
      <div class="sidebar">
        <div onclick="toggleLogo()" style="font-size:40px; font-weight:bold; cursor:pointer; margin-bottom:30px;">ТЬ</div>
        <div style="font-size:20px; margin:15px 0; cursor:pointer;">🏠 Главная</div>
        <div style="font-size:20px; margin:15px 0; cursor:pointer;">🔍 Поиск</div>
        <div style="font-size:20px; margin:15px 0; cursor:pointer;">🛎 Уведомления</div>
        <div style="font-size:20px; margin:15px 0; cursor:pointer;" onclick="showProfile()">👤 Профиль</div>
        <button onclick="logout()" style="width:100%; margin-top:30px;">Выйти</button>
      </div>

      <!-- Основная лента -->
      <div class="main">
        <div class="header">Главная</div>
        
        <!-- Создать пост (только не гость) -->
        <div id="postCreator" class="post-box">
          <textarea id="postText" placeholder="Что происходит?"></textarea>
          <div class="g-recaptcha" id="recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div> <!-- Тестовый ключ! Замени на свой -->
          <button onclick="createPost()">Опубликовать в Ть</button>
        </div>

        <!-- Лента постов -->
        <div id="posts" class="posts"></div>
      </div>

      <!-- Правая панель -->
      <div class="rightbar">
        <h3>Что происходит</h3>
        <p style="color:#888;">Рекомендации и тренды скоро появятся...</p>
        
        <div id="profileInfo" style="margin-top:30px;"></div>
      </div>
    </div>
  </div>

<script>
// === Глобальные переменные ===
let currentUser = null;
let posts = [];

// === Анимация логотипа ===
function toggleLogo() {
  const text = document.getElementById('expandText');
  text.classList.toggle('active');
}

// === Google Sign-In ===
function handleCredentialResponse(response) {
  const data = jwt_decode(response.credential); // Нужно добавить jwt_decode (см. ниже)
  
  currentUser = {
    type: 'google',
    name: data.name,
    email: data.email,
    picture: data.picture
  };
  
  startApp();
}

// Простая функция для декодирования JWT (добавь эту библиотеку)
function jwt_decode(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

// === Гостевой вход ===
function guestLogin() {
  currentUser = { type: 'guest', name: 'Гость', picture: '' };
  startApp();
}

// === Запуск приложения ===
function startApp() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  
  if (currentUser.type === 'guest') {
    document.getElementById('postCreator').style.display = 'none';
  }
  
  loadPosts();
  updateProfileInfo();
}

// === Профиль ===
function showProfile() {
  alert(`Профиль:\nИмя: ${currentUser.name}\nТип: ${currentUser.type === 'guest' ? 'Гость' : 'Google'}`);
}

function updateProfileInfo() {
  const info = document.getElementById('profileInfo');
  info.innerHTML = `
    <strong>${currentUser.name}</strong><br>
    <small>${currentUser.type === 'guest' ? 'Только просмотр' : currentUser.email}</small>
    ${currentUser.type === 'guest' ? '<br><button onclick="location.reload()">Войти через Google</button>' : ''}
  `;
}

// === Создание поста с reCAPTCHA ===
function createPost() {
  const text = document.getElementById('postText').value.trim();
  if (!text) return alert('Пост не может быть пустым');
  if (text.length < 3) return alert('Пост слишком короткий');

  // Проверка reCAPTCHA (тестовая)
  const recaptchaResponse = grecaptcha.getResponse();
  if (!recaptchaResponse) {
    return alert('Пожалуйста, подтвердите, что вы не робот');
  }

  posts.unshift({
    id: Date.now(),
    user: currentUser.name,
    avatar: currentUser.picture || 'https://via.placeholder.com/48',
    text: text,
    date: new Date().toLocaleString('ru-RU'),
    likes: 0,
    comments: []
  });

  savePosts();
  document.getElementById('postText').value = '';
  grecaptcha.reset();
  loadPosts();
}

// === Загрузка и отображение постов ===
function loadPosts() {
  const container = document.getElementById('posts');
  container.innerHTML = '';

  posts.forEach(post => {
    const div = document.createElement('div');
    div.className = 'post';
    div.innerHTML = `
      <div class="post-header">
        <img src="${post.avatar}" class="avatar">
        <div class="post-content">
          <strong>${post.user}</strong> · ${post.date}
          <p>${post.text}</p>
          <div class="actions">
            <span class="action" onclick="likePost(${post.id})">❤️ ${post.likes}</span>
            <span class="action" onclick="addComment(${post.id})">💬 ${post.comments.length}</span>
          </div>
          <div id="comments-${post.id}"></div>
        </div>
      </div>
    `;
    container.appendChild(div);
    renderComments(post.id);
  });
}

function likePost(id) {
  const post = posts.find(p => p.id === id);
  if (post) {
    post.likes++;
    savePosts();
    loadPosts();
  }
}

function addComment(id) {
  if (currentUser.type === 'guest') return alert('Гости не могут комментировать');
  
  const commentText = prompt('Ваш комментарий:');
  if (!commentText) return;
  
  const post = posts.find(p => p.id === id);
  if (post) {
    post.comments.push({ user: currentUser.name, text: commentText });
    savePosts();
    loadPosts();
  }
}

function renderComments(postId) {
  const post = posts.find(p => p.id === postId);
  if (!post) return;
  
  const container = document.getElementById(`comments-${postId}`);
  if (!container) return;
  
  container.innerHTML = post.comments.map(c => `
    <div style="margin:8px 0; font-size:14px;">
      <strong>${c.user}:</strong> ${c.text}
    </div>
  `).join('');
}

// === Сохранение в localStorage ===
function savePosts() {
  localStorage.setItem('twiiernost_posts', JSON.stringify(posts));
}

function loadSavedPosts() {
  const saved = localStorage.getItem('twiiernost_posts');
  if (saved) posts = JSON.parse(saved);
}

// === Выход ===
function logout() {
  if (confirm('Выйти из аккаунта?')) {
    location.reload();
  }
}

// === Инициализация ===
window.onload = function() {
  loadSavedPosts();
  
  // Для удобства тестирования можно раскомментировать гостевой вход автоматически:
  // setTimeout(guestLogin, 500);
};
</script>

<!-- Библиотека для декодирования JWT (нужна для Google) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jwt-decode/3.1.2/jwt-decode.min.js"></script>

</body>
</html>
