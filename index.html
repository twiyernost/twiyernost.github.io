<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ть (Твиьерность)</title>
  
  <!-- Google Identity Services (для красивой кнопки "Войти через Google") -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Firebase SDK v9+ (modular) через CDN -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, onSnapshot, orderBy, query, serverTimestamp, updateDoc, doc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    // ====================== ТВОЯ FIREBASE КОНФИГУРАЦИЯ ======================
    // ЗАМЕНИ ЭТИ ДАННЫЕ НА СВОИ ИЗ FIREBASE CONSOLE → Project Settings → SDK setup
    const firebaseConfig = {
      apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXX",           // ← замени
      authDomain: "твой-проект.firebaseapp.com",            // ← замени
      projectId: "твой-проект",                             // ← замени
      storageBucket: "твой-проект.appspot.com",             // ← замени
      messagingSenderId: "1234567890",                       // ← замени
      appId: "1:1234567890:web:xxxxxxxxxxxxxxxxxxxxxxxx"     // ← замени
    };

    // Инициализация Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Глобальные переменные (доступны в остальном скрипте)
    window.firebaseAuth = auth;
    window.firebaseDb = db;
    window.firebaseSignInWithPopup = signInWithPopup;
    window.firebaseGoogleProvider = provider;
    window.firebaseOnAuthStateChanged = onAuthStateChanged;
    window.firebaseSignOut = signOut;
    window.firebaseAddDoc = addDoc;
    window.firebaseGetDocs = getDocs;
    window.firebaseOnSnapshot = onSnapshot;
    window.firebaseQuery = query;
    window.firebaseCollection = collection;
    window.firebaseOrderBy = orderBy;
    window.firebaseServerTimestamp = serverTimestamp;
    window.firebaseUpdateDoc = updateDoc;
    window.firebaseDoc = doc;
    window.firebaseArrayUnion = arrayUnion;
  </script>

  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --accent: #1d9bf0;
      --border: #333;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
    
    /* Мобильная адаптация */
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100vh; background: #000; z-index: 200; transition: left 0.4s ease; }
      .sidebar.active { left: 0; }
      .main { height: calc(100vh - 60px); border-right: none; }
      .rightbar { display: none; }
      .header { padding: 12px; font-size: 18px; }
      textarea { font-size: 16px; height: 70px; }
    }

    #auth { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:100; }
    .auth-box { background:#16181c; padding:40px 30px; border-radius:20px; text-align:center; width:90%; max-width:340px; }
    .logo { font-size:90px; font-weight:900; cursor:pointer; transition:0.3s; }
    .logo:hover { transform:scale(1.15); }
    .full-name { font-size:32px; font-weight:700; margin-top:8px; opacity:0; transition:all 0.5s; }
    .full-name.active { opacity:1; transform:translateY(-10px); }

    .container { display:flex; height:100vh; max-width:1280px; margin:0 auto; }
    .sidebar { width:260px; padding:20px; border-right:1px solid var(--border); overflow-y:auto; }
    .main { flex:1; overflow-y:auto; }
    .rightbar { width:320px; padding:20px; border-left:1px solid var(--border); overflow-y:auto; }

    .header { padding:15px 20px; border-bottom:1px solid var(--border); font-size:22px; font-weight:700; display:flex; align-items:center; gap:15px; position:sticky; top:0; background:#000; z-index:10; }
    .hamburger { font-size:32px; cursor:pointer; display:none; }
    @media (max-width: 768px) { .hamburger { display:block; } }

    .nav-item { padding:14px 20px; font-size:20px; border-radius:999px; cursor:pointer; transition:0.2s; }
    .nav-item:hover { background:#1a1a1a; }

    .post-box { padding:20px; border-bottom:1px solid var(--border); }
    textarea { width:100%; background:transparent; border:none; color:white; font-size:20px; resize:none; height:110px; outline:none; }
    button { background:var(--accent); color:white; border:none; padding:12px 28px; border-radius:999px; font-weight:700; cursor:pointer; }
    button:hover { background:#1a8cd8; }

    .posts { }
    .post { padding:15px 20px; border-bottom:1px solid var(--border); }
    .post-header { display:flex; gap:12px; }
    .avatar { width:48px; height:48px; border-radius:50%; object-fit:cover; background:#222; }
    .post-content { flex:1; }
    .actions { display:flex; justify-content:space-around; max-width:320px; margin-top:12px; font-size:18px; }
    .action { cursor:pointer; transition:0.2s; }
    .action:hover { transform:scale(1.2); }

    /* Модальные окна */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:300; }
    .modal-content { background:#16181c; width:90%; max-width:420px; border-radius:20px; padding:25px; text-align:center; }
    .captcha-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:20px 0; }
    .captcha-img { width:100%; height:110px; object-fit:cover; border-radius:12px; cursor:pointer; border:3px solid transparent; transition:0.2s; }
    .captcha-img.selected { border:3px solid #1d9bf0; }
  </style>
</head>
<body>

  <!-- ЭКРАН АВТОРИЗАЦИИ -->
  <div id="auth">
    <div class="auth-box">
      <div id="logo" class="logo" onclick="toggleLogo()">ТЬ</div>
      <div id="expandText" class="full-name">Твиьерность</div>
      <h2 style="margin:20px 0 8px;">Добро пожаловать</h2>
      <p style="color:#888; margin-bottom:25px;">Присоединяйся к разговору</p>
      
      <!-- Кнопка Google (Firebase + Google Identity) -->
      <button onclick="googleSignIn()" style="background:#4285F4; width:100%; padding:14px; font-size:16px; margin-bottom:15px;">
        Войти через Google
      </button>
      
      <button onclick="guestLogin()" style="background:#333; width:100%;">Войти как гость 👀</button>
      <p style="margin-top:20px; font-size:13px; color:#666;">Гости могут только читать</p>
    </div>
  </div>

  <!-- ПРИЛОЖЕНИЕ -->
  <div id="app" style="display:none;">
    <div class="container">
      <!-- САЙДБАР -->
      <div id="sidebar" class="sidebar">
        <div onclick="toggleLogo()" style="font-size:48px; font-weight:900; cursor:pointer; margin:20px 0 30px;">ТЬ</div>
        <div class="nav-item" onclick="showFeed()">🏠 Главная</div>
        <div class="nav-item" onclick="showProfileModal()">👤 Профиль</div>
        <div class="nav-item" onclick="logout()">🚪 Выйти</div>
      </div>

      <!-- ЛЕНТА -->
      <div class="main">
        <div class="header">
          <span class="hamburger" onclick="toggleMobileMenu()">≡</span>
          <span style="flex:1;">Главная</span>
        </div>

        <div id="postCreator" class="post-box">
          <div style="display:flex; gap:12px;">
            <img id="myAvatar" src="https://via.placeholder.com/48" class="avatar" style="width:42px;height:42px;">
            <textarea id="postText" placeholder="Что происходит?"></textarea>
          </div>
          <button onclick="verifyHumanAndPost()" style="margin-top:15px; width:100%;">Опубликовать в Ть</button>
        </div>

        <div id="posts" class="posts"></div>
      </div>

      <!-- ПРАВАЯ ПАНЕЛЬ -->
      <div class="rightbar">
        <h3>Ты в Твиьерности</h3>
        <div id="profileInfo"></div>
      </div>
    </div>
  </div>

  <!-- МОДАЛКА ПРОФИЛЯ -->
  <div id="profileModal" class="modal">
    <div class="modal-content">
      <h3>Редактировать профиль</h3>
      <input type="text" id="editName" placeholder="Имя" style="width:100%; padding:12px; margin:10px 0; background:#222; color:white; border:none; border-radius:12px;">
      <input type="text" id="editUsername" placeholder="Никнейм (@)" style="width:100%; padding:12px; margin:10px 0; background:#222; color:white; border:none; border-radius:12px;">
      <label style="color:#888; display:block; margin:10px 0 5px;">Аватарка</label>
      <input type="file" id="editAvatar" accept="image/*" style="width:100%; padding:8px; background:#222; color:white; border-radius:12px;">
      <button onclick="saveProfile()" style="margin-top:15px; width:100%;">Сохранить</button>
      <button onclick="closeProfileModal()" style="background:#333; width:100%; margin-top:8px;">Отмена</button>
    </div>
  </div>

  <!-- МОДАЛКА КАПЧИ (просто "я не робот" с картинками) -->
  <div id="captchaModal" class="modal">
    <div class="modal-content">
      <h3>Докажи, что ты не робот 🛡️</h3>
      <p id="captchaInstruction" style="margin:15px 0; font-size:18px;">Нажми на <strong>все изображения с автомобилями</strong></p>
      <div id="captchaGrid" class="captcha-grid"></div>
      <button onclick="checkCaptcha()" style="margin-top:15px; width:100%;">Подтвердить</button>
      <button onclick="closeCaptcha()" style="background:#333; width:100%; margin-top:8px;">Отмена</button>
    </div>
  </div>

<script>
// ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
let currentUser = null;
let posts = [];
let captchaSelected = [];
let captchaCorrectIndexes = [];

// Firebase будет доступен после загрузки модуля
let auth, db, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, addDoc, getDocs, onSnapshot, query, collection, orderBy, serverTimestamp, updateDoc, doc, arrayUnion;

// Ждём загрузки Firebase
window.addEventListener('load', () => {
  // Firebase уже инициализирован в модуле выше
  auth = window.firebaseAuth;
  db = window.firebaseDb;
  signInWithPopup = window.firebaseSignInWithPopup;
  GoogleAuthProvider = window.firebaseGoogleProvider;
  onAuthStateChanged = window.firebaseOnAuthStateChanged;
  signOut = window.firebaseSignOut;
  addDoc = window.firebaseAddDoc;
  getDocs = window.firebaseGetDocs;
  onSnapshot = window.firebaseOnSnapshot;
  query = window.firebaseQuery;
  collection = window.firebaseCollection;
  orderBy = window.firebaseOrderBy;
  serverTimestamp = window.firebaseServerTimestamp;
  updateDoc = window.firebaseUpdateDoc;
  doc = window.firebaseDoc;
  arrayUnion = window.firebaseArrayUnion;

  // Слушаем состояние авторизации Firebase
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = {
        type: 'google',
        uid: user.uid,
        name: user.displayName || 'Пользователь',
        username: '@' + (user.email ? user.email.split('@')[0] : 'user'),
        avatar: user.photoURL || 'https://via.placeholder.com/48',
        verified: true
      };
      loadUserProfile(); // применяем локальные правки имени/авы
      startApp();
    }
  });
});

// ==================== ЛОГО ====================
function toggleLogo() {
  document.getElementById('expandText').classList.toggle('active');
}

// ==================== ВХОД ЧЕРЕЗ GOOGLE (исправленный через Firebase) ====================
async function googleSignIn() {
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    // Пользователь уже обработается в onAuthStateChanged
  } catch (error) {
    console.error("Ошибка входа через Google:", error);
    alert("Не удалось войти через Google. Проверь конфигурацию Firebase.");
  }
}

// ==================== ГОСТЬ ====================
function guestLogin() {
  currentUser = {
    type: 'guest',
    name: 'Гость',
    username: '@guest',
    avatar: 'https://via.placeholder.com/48',
    verified: false
  };
  showCaptcha(() => startApp());
}

// ==================== ЗАПУСК ПРИЛОЖЕНИЯ ====================
function startApp() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  
  if (currentUser.type === 'guest') {
    document.getElementById('postCreator').style.display = 'none';
  } else {
    document.getElementById('postCreator').style.display = 'block';
  }
  
  loadPostsFromFirebase();
  updateProfileInfo();
}

// ==================== ПРОФИЛЬ ====================
function loadUserProfile() {
  const saved = localStorage.getItem('twiiernost_user_' + (currentUser.uid || 'guest'));
  if (saved) {
    const s = JSON.parse(saved);
    if (s.name) currentUser.name = s.name;
    if (s.username) currentUser.username = s.username;
    if (s.avatar) currentUser.avatar = s.avatar;
  }
}

function saveUserProfile() {
  localStorage.setItem('twiiernost_user_' + (currentUser.uid || 'guest'), JSON.stringify({
    name: currentUser.name,
    username: currentUser.username,
    avatar: currentUser.avatar
  }));
}

function updateProfileInfo() {
  document.getElementById('profileInfo').innerHTML = `
    <img src="${currentUser.avatar}" class="avatar" style="width:68px;height:68px;margin-bottom:12px;">
    <strong>${currentUser.name}</strong><br>
    <span style="color:#1d9bf0;">${currentUser.username}</span><br>
    <small>${currentUser.type === 'guest' ? 'Только просмотр' : 'Google'}</small>
  `;
  document.getElementById('myAvatar').src = currentUser.avatar;
}

function showProfileModal() {
  document.getElementById('editName').value = currentUser.name;
  document.getElementById('editUsername').value = currentUser.username.replace('@','');
  document.getElementById('profileModal').style.display = 'flex';
}

function closeProfileModal() {
  document.getElementById('profileModal').style.display = 'none';
}

function saveProfile() {
  const newName = document.getElementById('editName').value.trim();
  const newUsername = '@' + document.getElementById('editUsername').value.trim();
  
  if (newName) currentUser.name = newName;
  if (newUsername.length > 1) currentUser.username = newUsername;
  
  const file = document.getElementById('editAvatar').files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      currentUser.avatar = e.target.result;
      saveUserProfile();
      updateProfileInfo();
      closeProfileModal();
    };
    reader.readAsDataURL(file);
  } else {
    saveUserProfile();
    updateProfileInfo();
    closeProfileModal();
  }
}

// ==================== МОБИЛЬНОЕ МЕНЮ ====================
function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('active');
}

function showFeed() {
  document.getElementById('sidebar').classList.remove('active');
}

// ==================== КАПЧА С КАРТИНКАМИ ====================
function showCaptcha(callback) {
  if (currentUser.verified) return callback();
  
  captchaSelected = [];
  const grid = document.getElementById('captchaGrid');
  grid.innerHTML = '';
  
  const images = [
    {src: "https://picsum.photos/id/1015/150", isCar: true},
    {src: "https://picsum.photos/id/160/150", isCar: true},
    {src: "https://picsum.photos/id/29/150", isCar: true},
    {src: "https://picsum.photos/id/201/150", isCar: false},
    {src: "https://picsum.photos/id/251/150", isCar: false},
    {src: "https://picsum.photos/id/30/150", isCar: false}
  ];
  
  const shuffled = images.sort(() => Math.random() - 0.5);
  captchaCorrectIndexes = shuffled.map((img, i) => img.isCar ? i : -1).filter(i => i !== -1);
  
  shuffled.forEach((img, i) => {
    const el = document.createElement('img');
    el.src = img.src;
    el.className = 'captcha-img';
    el.onclick = () => {
      el.classList.toggle('selected');
      const idx = captchaSelected.indexOf(i);
      idx > -1 ? captchaSelected.splice(idx, 1) : captchaSelected.push(i);
    };
    grid.appendChild(el);
  });
  
  document.getElementById('captchaModal').style.display = 'flex';
  window.currentCaptchaCallback = callback;
}

function checkCaptcha() {
  const isCorrect = captchaSelected.length === 3 && 
                    captchaSelected.every(idx => captchaCorrectIndexes.includes(idx));
  
  if (isCorrect) {
    currentUser.verified = true;
    document.getElementById('captchaModal').style.display = 'none';
    window.currentCaptchaCallback();
  } else {
    alert('❌ Неправильно! Попробуй ещё раз.');
    captchaSelected = [];
    document.querySelectorAll('.captcha-img').forEach(el => el.classList.remove('selected'));
  }
}

function closeCaptcha() {
  document.getElementById('captchaModal').style.display = 'none';
}

// ==================== ПОСТЫ С FIREBASE ====================
async function verifyHumanAndPost() {
  if (currentUser.type === 'guest') return alert('Гости не могут публиковать');
  showCaptcha(() => createPost());
}

async function createPost() {
  const text = document.getElementById('postText').value.trim();
  if (!text || text.length < 3) return alert('Пост слишком короткий');

  try {
    await addDoc(collection(db, "posts"), {
      user: currentUser.name,
      username: currentUser.username,
      avatar: currentUser.avatar,
      text: text,
      uid: currentUser.uid || 'guest',
      timestamp: serverTimestamp(),
      likes: 0,
      comments: []
    });
    document.getElementById('postText').value = '';
    loadPostsFromFirebase();
  } catch (e) {
    console.error("Ошибка публикации:", e);
    alert("Не удалось опубликовать пост. Проверь подключение к Firebase.");
  }
}

function loadPostsFromFirebase() {
  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
  
  onSnapshot(q, (snapshot) => {
    posts = [];
    snapshot.forEach(doc => {
      const data = doc.data();
      posts.push({
        id: doc.id,
        user: data.user,
        username: data.username,
        avatar: data.avatar,
        text: data.text,
        date: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString('ru-RU') : 'только что',
        likes: data.likes || 0,
        comments: data.comments || []
      });
    });
    renderPosts();
  });
}

function renderPosts() {
  const container = document.getElementById('posts');
  container.innerHTML = '';
  
  posts.forEach(post => {
    const div = document.createElement('div');
    div.className = 'post';
    div.innerHTML = `
      <div class="post-header">
        <img src="${post.avatar}" class="avatar">
        <div class="post-content">
          <strong>${post.user}</strong> <span style="color:#1d9bf0;">${post.username}</span><br>
          <small>${post.date}</small>
          <p style="margin:10px 0;">${post.text}</p>
          <div class="actions">
            <span class="action" onclick="likePost('${post.id}')">❤️ ${post.likes}</span>
            <span class="action" onclick="addComment('${post.id}')">💬 ${post.comments.length}</span>
          </div>
          <div id="comments-${post.id}" style="margin-top:10px; font-size:14px;"></div>
        </div>
      </div>
    `;
    container.appendChild(div);
    renderComments(post.id);
  });
}

async function likePost(postId) {
  try {
    const postRef = doc(db, "posts", postId);
    await updateDoc(postRef, { likes: arrayUnion(1) }); // простой способ увеличить
    // В реальности лучше использовать transaction, но для простоты
  } catch (e) { console.error(e); }
}

function addComment(postId) {
  if (currentUser.type === 'guest') return alert('Гости не могут комментировать');
  const text = prompt('Твой комментарий:');
  if (!text) return;
  
  const postRef = doc(db, "posts", postId);
  updateDoc(postRef, {
    comments: arrayUnion({ user: currentUser.name, text })
  });
}

function renderComments(postId) {
  const post = posts.find(p => p.id === postId);
  if (!post) return;
  const container = document.getElementById(`comments-${postId}`);
  if (!container) return;
  container.innerHTML = post.comments.map(c => `
    <div style="margin:6px 0; padding:6px 10px; background:#111; border-radius:8px;">
      <strong>${c.user}:</strong> ${c.text}
    </div>
  `).join('');
}

// ==================== ВЫХОД ====================
async function logout() {
  if (currentUser.type === 'google') {
    try {
      await signOut(auth);
    } catch (e) {}
  }
  location.reload();
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
</script>
</body>
</html>
