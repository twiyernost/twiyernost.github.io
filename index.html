<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твиьерость</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --black: #000000;
            --white: #eff3f4;
            --gray: #202327;
            --accent: #1d9bf0;
            --border: #333639;
            --text-gray: #71767b;
        }

        * { box-sizing: border-box; transition: background 0.2s; }
        body { 
            margin: 0; 
            background: var(--black); 
            color: var(--white); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-y: scroll;
        }

        .app-container { display: flex; justify-content: center; max-width: 1250px; margin: 0 auto; }
        
        /* Боковая панель */
        nav { width: 275px; padding: 10px; height: 100vh; position: sticky; top: 0; border-right: 1px solid var(--border); }
        .nav-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px; 
            font-size: 20px; border-radius: 99px; cursor: pointer; margin-bottom: 5px; 
        }
        .nav-item:hover { background: #181818; }
        .nav-item.active { font-weight: bold; }
        .logo { font-size: 32px; font-weight: 900; padding: 10px; color: var(--white); cursor: pointer; }

        /* Контент */
        main { width: 600px; min-height: 100vh; border-right: 1px solid var(--border); }
        .page-header { 
            padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid var(--border); 
            sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 5; 
        }
        
        .section { display: none; }
        .section.active { display: block; }

        /* Профиль */
        .profile-banner { height: 200px; background: #333; position: relative; }
        .profile-avatar-big { 
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid black; 
            background: #555; position: absolute; bottom: -60px; left: 20px; 
            background-image: url('https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png');
            background-size: cover;
        }
        .profile-info { margin-top: 70px; padding: 20px; }
        .profile-info h2 { margin: 0; font-size: 24px; }
        .profile-info span { color: var(--text-gray); }

        /* Поле создания поста */
        .tweet-box { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .avatar-sm { width: 48px; height: 48px; border-radius: 50%; background: #444; flex-shrink: 0; }
        textarea { 
            width: 100%; background: none; border: none; color: white; 
            font-size: 20px; outline: none; resize: none; padding-top: 10px;
        }
        .btn-post { 
            background: var(--accent); color: white; border: none; 
            padding: 10px 24px; border-radius: 99px; font-weight: bold; 
            cursor: pointer; float: right; margin-top: 10px;
        }

        /* Модальное окно входа */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(91, 112, 131, 0.4); display: none; 
            justify-content: center; align-items: center; z-index: 100; 
        }
        .modal { background: black; padding: 40px; border-radius: 16px; width: 400px; text-align: center; border: 1px solid var(--border); }

        /* Мобильная навигация */
        .mobile-bar { display: none; }

        @media (max-width: 1000px) { nav { width: 80px; } .nav-text { display: none; } }
        @media (max-width: 600px) {
            nav { display: none; }
            main { width: 100%; border: none; }
            .mobile-bar { 
                display: flex; position: fixed; bottom: 0; width: 100%; 
                background: black; border-top: 1px solid var(--border); 
                justify-content: space-around; padding: 15px; z-index: 10;
            }
            .app-container { padding-bottom: 60px; }
        }
    </style>
</head>
<body>

<div id="loginModal" class="modal-overlay">
    <div class="modal">
        <div class="logo">Т</div>
        <h2 style="margin-bottom: 10px;">Войти в Твиьерость</h2>
        <p style="color: var(--text-gray); margin-bottom: 25px;">Только через Google аккаунт</p>
        
        <div style="display: flex; justify-content: center;">
            <div id="g_id_onload"
                 data-client_id="254609526549-srv2qeo7otu12op9eh9qfkf0h8lpgck9.apps.googleusercontent.com"
                 data-callback="handleSignIn">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue"></div>
        </div>
        
        <button onclick="closeLogin()" style="margin-top: 25px; background: none; border: none; color: var(--white); cursor: pointer; text-decoration: underline;">Закрыть</button>
    </div>
</div>

<div class="app-container">
    <nav>
        <div class="logo" onclick="showSection('feed')">Т</div>
        <div class="nav-item active" onclick="showSection('feed', this)">🏠 <span class="nav-text">Главная</span></div>
        <div class="nav-item" onclick="showSection('explore', this)">🔍 <span class="nav-text">Поиск</span></div>
        <div class="nav-item" onclick="showSection('profile', this)">👤 <span class="nav-text">Профиль</span></div>
        <button class="btn-post" style="width: 100%; margin-top: 20px; float: none;">Твиьеростнуть</button>
    </nav>

    <main>
        <div id="feed" class="section active">
            <div class="page-header">Главная</div>
            <div class="tweet-box">
                <div class="avatar-sm"></div>
                <div style="flex:1">
                    <textarea id="postText" placeholder="Что происходит?"></textarea>
                    <button class="btn-post" onclick="checkAuthAndPost()">Пост</button>
                </div>
            </div>
            <div id="postsContainer" style="padding: 20px; text-align: center; color: var(--text-gray);">
                Лента пуста. Станьте первым!
            </div>
        </div>

        <div id="profile" class="section">
            <div class="page-header">Профиль</div>
            <div class="profile-banner"><div class="profile-avatar-big"></div></div>
            <div class="profile-info">
                <h2 id="userNameDisplay">Гость</h2>
                <span id="userHandle">@guest</span>
                <p>Вы вошли как гость. Для публикации постов авторизуйтесь.</p>
                <button class="btn-post" style="float: none;" onclick="openLogin()">Войти в Google</button>
            </div>
        </div>

        <div id="explore" class="section">
            <div class="page-header">Актуальное</div>
            <div style="padding: 20px;">
                <div style="background: var(--gray); padding: 12px; border-radius: 99px; color: var(--text-gray);">
                    🔍 Поиск в Твиьерости (в разработке)
                </div>
            </div>
        </div>
    </main>
</div>

<div class="mobile-bar">
    <div onclick="showSection('feed')">🏠</div>
    <div onclick="showSection('explore')">🔍</div>
    <div onclick="showSection('profile')">👤</div>
</div>

<script>
    let isAuthenticated = false;

    // Переключение разделов
    function showSection(sectionId, element) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        
        if(element) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }
        window.scrollTo(0,0);
    }

    // Логика входа
    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

    function handleSignIn(response) {
        console.log("Вход выполнен успешно");
        isAuthenticated = true;
        closeLogin();
        
        // В реальном приложении здесь нужно декодировать JWT для получения имени
        document.getElementById('userNameDisplay').innerText = "Пользователь Google";
        document.getElementById('userHandle').innerText = "@google_user";
        alert("Добро пожаловать в Твиьерость!");
    }

    function checkAuthAndPost() {
        if(!isAuthenticated) {
            openLogin();
        } else {
            const val = document.getElementById('postText').value;
            if(val) {
                alert("Ваш пост опубликован (локально): " + val);
                document.getElementById('postText').value = '';
            }
        }
    }

    // Автоматическое открытие окна входа через 2 секунды, если не вошел
    setTimeout(() => {
        if(!isAuthenticated) openLogin();
    }, 2000);
</script>

</body>
</html>
